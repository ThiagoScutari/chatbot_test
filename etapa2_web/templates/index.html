<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 620px;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 78%;
            padding: 9px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.bot  { background: #e9ecef; align-self: flex-start; border-radius: 2px 10px 10px 10px; }
        .msg.user { background: #d9fdd3; align-self: flex-end;   border-radius: 10px 2px 10px 10px; }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus { border-color: #075e54; }

        .chat-input button {
            padding: 10px 20px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .chat-input button:hover   { background: #128c7e; }
        .chat-input button:disabled { background: #aaa; cursor: default; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">🤖 Atendimento Online</div>

    <div class="chat-messages" id="messages">
        <!-- Mensagem inicial enviada pelo servidor via Jinja2 -->
        <div class="msg bot">{{ mensagem_inicial }}</div>
    </div>

    <div class="chat-input">
        <input type="text" id="input" placeholder="Digite sua mensagem..." autofocus>
        <button id="btn-enviar" onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
    const input    = document.getElementById("input");
    const btnEnviar = document.getElementById("btn-enviar");
    const messages = document.getElementById("messages");
    let encerrada  = false;

    // Envia com Enter
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") enviar();
    });

    async function enviar() {
        if (encerrada) return;
        const texto = input.value.trim();
        if (!texto) return;

        adicionarMsg(texto, "user");
        input.value = "";
        input.disabled = true;
        btnEnviar.disabled = true;

        try {
            const res = await fetch("/mensagem", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texto }),
            });
            const dados = await res.json();

            adicionarMsg(dados.resposta, "bot");

            // Se a ação é enviar catálogo, inicia o download automaticamente
            if (dados.acao === "enviar_catalogo") {
                window.location.href = "/catalogo";
            }

            if (dados.fim) {
                encerrada = true;
                input.placeholder = "Conversa encerrada. Recarregue a página para recomeçar.";
                return; // não reabilita o input
            }
        } catch (err) {
            adicionarMsg("Erro de conexão. Tente novamente.", "bot");
        }

        input.disabled = false;
        btnEnviar.disabled = false;
        input.focus();
    }

    function adicionarMsg(texto, tipo) {
        const div = document.createElement("div");
        div.className = `msg ${tipo}`;
        div.textContent = texto;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
